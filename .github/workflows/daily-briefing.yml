name: 정책 브리핑 자동 발송

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 평일 07:00 KST (UTC 22:00, 월~금)
  workflow_dispatch:       # 대시보드에서 수동 실행 가능

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r "(워크플로우) 모닝브리핑/requirements.txt"

      - name: 정책 브리핑 실행
        env:
          SMTP_KEY:     ${{ secrets.SMTP_KEY }}
          SMTP_USER:    ${{ secrets.SMTP_USER }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_NAME:  ${{ secrets.SENDER_NAME }}
          RECIPIENTS:   "lim_seong_jin@naver.com,jeon.jegyeong@gmail.com"
        run: python "(워크플로우) 모닝브리핑/briefing.py"
