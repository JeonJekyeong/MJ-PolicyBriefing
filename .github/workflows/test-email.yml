name: 테스트 이메일 발송

on:
  workflow_dispatch:

jobs:
  send-test:
    runs-on: ubuntu-latest

    steps:
      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 테스트 이메일 발송
        env:
          SMTP_KEY:     ${{ secrets.SMTP_KEY }}
          SMTP_USER:    ${{ secrets.SMTP_USER }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_NAME:  ${{ secrets.SENDER_NAME }}
          RECIPIENTS:   "lim_seong_jin@naver.com,jeon.jegyeong@gmail.com"
        run: |
          python - <<'EOF'
          import os, smtplib
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          smtp_key     = os.environ['SMTP_KEY']
          smtp_user    = os.environ['SMTP_USER']
          sender_email = os.environ['SENDER_EMAIL']
          sender_name  = os.environ['SENDER_NAME']
          recipients   = [e.strip() for e in os.environ['RECIPIENTS'].split(',')]
          print(f'수신자: {recipients}')
          print(f'SMTP 로그인: {smtp_user}')

          msg = MIMEMultipart('alternative')
          msg['Subject'] = '클로드 테스트'
          msg['From']    = f'{sender_name} <{sender_email}>'
          msg['To']      = ', '.join(recipients)
          msg.attach(MIMEText('<p>깃허브 테스트</p>', 'html', 'utf-8'))

          with smtplib.SMTP('smtp-relay.brevo.com', 587) as server:
              server.starttls()
              server.login(smtp_user, smtp_key)
              server.sendmail(sender_email, recipients, msg.as_string())
          print('발송 완료')
          EOF
